<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DGK Task Completion Test</title>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #F7F1E8;
      color: #4B362A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 520px;
      background: #FFF9F1;
      border: 1px solid rgba(75, 54, 42, 0.15);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 14px 34px rgba(75, 54, 42, 0.08);
    }
    h1 { margin-bottom: 12px; }
    p { line-height: 1.7; }
    button {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      background: #4B362A;
      color: #FFF9F1;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    pre {
      margin-top: 22px;
      padding: 16px;
      background: rgba(75, 54, 42, 0.08);
      border-radius: 16px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>DGK Task Completion Test</h1>
    <p>Tap the button below to mark <strong>Retest task completion API</strong> as Done in Notion.</p>
    <button id="completeButton">Complete Task</button>
    <pre id="result">Waiting for test...</pre>
  </main>

  <script>
    const pageId = '35d534c87a17810fbc37ea752757d492';
    const button = document.getElementById('completeButton');
    const result = document.getElementById('result');

    button.addEventListener('click', async () => {
      button.disabled = true;
      result.textContent = 'Sending request...';

      try {
        const response = await fetch('/api/notion/tasks/complete', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ pageId })
        });

        const data = await response.json();
        result.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        result.textContent = 'Error: ' + error.message;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
